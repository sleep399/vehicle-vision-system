<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车载视觉感知与人机交互系统</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="app">
    <!-- 登录页 -->
    <div id="login-page" class="page active">
      <div class="login-card">
        <h1>🚗 车载视觉感知系统</h1>
        <p class="subtitle">车牌识别 · 交警手势 · 车主控车 · 智能告警</p>
        <div class="tabs">
          <button class="tab active" data-tab="password">密码登录</button>
          <button class="tab" data-tab="code">验证码登录</button>
          <button class="tab" data-tab="wechat">微信扫码</button>
        </div>
        <div id="tab-password" class="tab-panel active">
          <input type="text" id="login-user" placeholder="用户名 (默认 admin)" value="admin">
          <input type="password" id="login-pass" placeholder="密码 (默认 admin123)" value="admin123">
          <button class="btn primary" onclick="App.login()">登录</button>
        </div>
        <div id="tab-code" class="tab-panel">
          <input type="text" id="code-target" placeholder="邮箱或手机号">
          <div class="row">
            <input type="text" id="code-input" placeholder="验证码">
            <button class="btn" onclick="App.sendCode()">获取验证码</button>
          </div>
          <button class="btn primary" onclick="App.loginCode()">验证码登录</button>
        </div>
        <div id="tab-wechat" class="tab-panel">
          <div class="qr-box" id="qr-box">点击获取二维码</div>
          <button class="btn primary" onclick="App.wechatLogin()">微信扫码登录</button>
        </div>
        <p class="hint">也可 <a href="#" onclick="App.skipLogin();return false">跳过登录</a> 直接体验</p>
      </div>
    </div>

    <!-- 主界面 -->
    <div id="main-page" class="page">
      <nav class="sidebar">
        <div class="logo">VisionCar</div>
        <a href="#" class="nav-item active" data-view="dashboard">📊 仪表盘</a>
        <a href="#" class="nav-item" data-view="lpr">🚙 车牌识别</a>
        <a href="#" class="nav-item" data-view="police">👮 交警手势</a>
        <a href="#" class="nav-item" data-view="owner">✋ 车主控车</a>
        <a href="#" class="nav-item" data-view="alerts">🔔 告警中心</a>
        <a href="#" class="nav-item" data-view="logs">📋 系统日志</a>
        <a href="/api/docs" target="_blank" class="nav-item">📖 API 文档</a>
        <div class="nav-footer">
          <span id="user-info">访客</span>
          <button class="btn small" onclick="App.logout()">退出</button>
        </div>
      </nav>

      <main class="content">
        <!-- 仪表盘 -->
        <section id="view-dashboard" class="view active">
          <h2>系统仪表盘</h2>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-num" id="stat-lpr">0</div><div class="stat-label">车牌识别次数</div></div>
            <div class="stat-card"><div class="stat-num" id="stat-police">0</div><div class="stat-label">交警手势识别</div></div>
            <div class="stat-card"><div class="stat-num" id="stat-owner">0</div><div class="stat-label">车主手势控制</div></div>
            <div class="stat-card alert"><div class="stat-num" id="stat-alerts">0</div><div class="stat-label">告警事件</div></div>
          </div>
          <div class="panel">
            <h3>最近告警</h3>
            <div id="dashboard-alerts" class="alert-list"></div>
          </div>
        </section>

        <!-- 车牌识别 -->
        <section id="view-lpr" class="view">
          <h2>道路车辆车牌识别</h2>
          <div class="dual-panel">
            <div class="panel">
              <div class="upload-area" id="lpr-upload">
                <input type="file" id="lpr-file" accept="image/*,video/*" hidden>
                <p>📷 上传道路场景图片或视频</p>
                <button class="btn" onclick="document.getElementById('lpr-file').click()">选择文件</button>
              </div>
              <div class="stream-controls">
                <button class="btn primary" onclick="App.startStream('lpr')">📹 开启摄像头实时识别</button>
                <button class="btn" onclick="App.stopStream()">停止</button>
              </div>
              <div class="stream-url-row">
                <input type="text" id="lpr-stream-url" placeholder="rtsp://... 或 http://... 视频流地址">
                <button class="btn" onclick="App.startUrlStream('lpr')">连接视频流</button>
              </div>
              <video id="lpr-video" autoplay playsinline muted hidden></video>
              <canvas id="lpr-canvas" hidden></canvas>
              <div id="lpr-results" class="results-box"></div>
            </div>
            <div class="panel">
              <h3>识别结果</h3>
              <img id="lpr-preview" class="preview-img" alt="识别预览">
              <video id="lpr-upload-preview" class="preview-img" controls hidden></video>
              <div id="lpr-plates" class="plate-list"></div>
              <h3>历史记录</h3>
              <div id="lpr-history" class="history-list"></div>
            </div>
          </div>
        </section>

        <!-- 交警手势 -->
        <section id="view-police" class="view">
          <h2>交警手势识别</h2>
          <div class="dual-panel">
            <div class="panel">
              <input type="file" id="police-file" accept="image/*,video/*" hidden>
              <button class="btn" onclick="document.getElementById('police-file').click()">上传图片/视频</button>
              <button class="btn primary" onclick="App.startStream('police')">📹 实时识别</button>
              <button class="btn" onclick="App.stopStream()">停止</button>
              <div class="stream-url-row">
                <input type="text" id="police-stream-url" placeholder="rtsp://... 或 http://... 视频流地址">
                <button class="btn" onclick="App.startUrlStream('police')">连接视频流</button>
              </div>
              <video id="police-video" autoplay playsinline muted hidden></video>
              <canvas id="police-canvas" hidden></canvas>
              <div id="police-gesture-list" class="gesture-ref"></div>
            </div>
            <div class="panel">
              <img id="police-preview" class="preview-img" alt="手势预览">
              <video id="police-upload-preview" class="preview-img" controls hidden></video>
              <div id="police-upload-controls" class="video-control-row" hidden>
                <button id="police-upload-play" class="btn primary" onclick="App.toggleUploadedPolicePlayback()">播放视频</button>
              </div>
              <div id="police-result" class="gesture-result"></div>
              <div id="police-history" class="history-list"></div>
            </div>
          </div>
        </section>

        <!-- 车主控车 -->
        <section id="view-owner" class="view">
          <h2>车主手势控车</h2>
          <div class="dual-panel">
            <div class="panel">
              <input type="file" id="owner-file" accept="image/*,video/*" hidden>
              <button class="btn" onclick="document.getElementById('owner-file').click()">上传图片/视频</button>
              <button class="btn primary" onclick="App.startStream('owner')">📹 实时手势控制</button>
              <button class="btn" onclick="App.stopStream()">停止</button>
              <div class="stream-url-row">
                <input type="text" id="owner-stream-url" placeholder="rtsp://... 或 http://... 视频流地址">
                <button class="btn" onclick="App.startUrlStream('owner')">连接视频流</button>
              </div>
              <video id="owner-video" autoplay playsinline muted hidden></video>
              <canvas id="owner-canvas" hidden></canvas>
              <div id="owner-gestures" class="gesture-ref"></div>
            </div>
            <div class="panel">
              <img id="owner-preview" class="preview-img" alt="手部预览">
              <video id="owner-upload-preview" class="preview-img" controls hidden></video>
              <div id="owner-result" class="gesture-result"></div>
              <div class="vehicle-panel">
                <h3>🚗 模拟车辆控制面板</h3>
                <div class="vehicle-control">
                  <label>系统状态: <span id="v-awake">休眠</span></label>
                  <label>当前页面: <span id="v-page">home</span></label>
                  <label>音量: <input type="range" id="v-volume" min="0" max="100" value="50" onchange="App.updateVehicle()"> <span id="v-volume-val">50</span></label>
                  <label>空调温度: <input type="range" id="v-temp" min="16" max="32" value="24" onchange="App.updateVehicle()"> <span id="v-temp-val">24</span>°C</label>
                  <div class="phone-btns">
                    <button class="btn" id="v-answer" onclick="App.setPhone('in_call')">📞 接听</button>
                    <button class="btn" id="v-hangup" onclick="App.setPhone('idle')">📵 挂断</button>
                    <span id="v-phone">空闲</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 告警中心 -->
        <section id="view-alerts" class="view">
          <h2>告警中心</h2>
          <div class="toolbar">
            <button class="btn" onclick="App.loadAlerts()">刷新</button>
            <button class="btn" onclick="App.testAlert()">触发测试告警</button>
          </div>
          <div class="stats-grid" id="alert-stats"></div>
          <div class="panel">
            <h3>实时告警推送</h3>
            <div id="live-alerts" class="alert-list"></div>
          </div>
          <div class="panel">
            <h3>告警历史时间线</h3>
            <div id="alert-timeline" class="timeline"></div>
          </div>
        </section>

        <!-- 系统日志 -->
        <section id="view-logs" class="view">
          <h2>系统日志</h2>
          <div class="toolbar">
            <select id="log-category" onchange="App.loadLogs()">
              <option value="">全部类别</option>
              <option value="lpr">车牌识别</option>
              <option value="police_gesture">交警手势</option>
              <option value="owner_gesture">车主手势</option>
              <option value="alert">告警</option>
              <option value="user">用户操作</option>
            </select>
            <button class="btn" onclick="App.loadLogs()">刷新</button>
          </div>
          <div id="log-table" class="log-table"></div>
        </section>
      </main>
    </div>

    <!-- 告警 Toast -->
    <div id="toast-container"></div>
  </div>
  <script src="/static/js/app.js?v=20260709-upload-video-playback"></script>
</body>
</html>
