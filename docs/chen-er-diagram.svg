<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" role="img" aria-labelledby="title desc">
  <title id="title">车载视觉感知与人机交互系统陈氏 ER 图</title>
  <desc id="desc">矩形代表实体表，菱形代表联系，椭圆代表属性。数字 1 和 n 表示基数。</desc>
  <style>
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #172033; font-size: 17px; text-anchor: middle; dominant-baseline: middle; }
    .title { font-size: 26px; font-weight: 700; }
    .section { font-size: 21px; font-weight: 700; }
    .entity { fill: #e8f0fe; stroke: #315c9f; stroke-width: 2; }
    .relationship { fill: #fff1db; stroke: #a35e12; stroke-width: 2; }
    .attribute { fill: #f8fafc; stroke: #526273; stroke-width: 1.5; }
    .edge { stroke: #526273; stroke-width: 1.6; fill: none; }
    .dashed { stroke-dasharray: 6 5; }
    .cardinality { font-size: 18px; font-weight: 700; fill: #8a4200; }
    .note { font-size: 14px; fill: #526273; }
    .key { text-decoration: underline; }
  </style>

  <text x="800" y="38" class="title">车载视觉感知与人机交互系统（陈氏 ER 图）</text>
  <text x="800" y="66" class="note">矩形＝实体表　菱形＝联系　椭圆＝属性　下划线＝主键　虚线＝当前由应用层维护、未建数据库外键</text>

